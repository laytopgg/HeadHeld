name: "Feature request"
description: "Suggest an idea or improvement for this project"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Please provide as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: A clear and concise description of the feature you want.
    validations:
      required: true
  - type: textarea
    id: use_cases
    attributes:
      label: Use cases and benefits
      description: Explain the use cases and why this feature would be beneficial.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
