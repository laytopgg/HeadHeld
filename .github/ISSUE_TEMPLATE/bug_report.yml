name: "Bug report"
description: "Report a bug or crash"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Please fill out the details below to help us reproduce the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? Describe the bug in detail.
      placeholder: The item does not appear above the player's head when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the steps we need to take to reproduce this bug.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: The item should appear above the player's head.
    validations:
      required: true
  - type: input
    id: mod_version
    attributes:
      label: Mod version
      description: Which version of HeadHeld are you using?
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: minecraft_version
    attributes:
      label: Minecraft version
      description: Which version of Minecraft are you using?
      placeholder: 1.20.x
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Attach relevant logs, crash reports, or screenshots.
